services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resolveai-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///app/ai_customer_support.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    container_name: resolveai-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  backend-data:
